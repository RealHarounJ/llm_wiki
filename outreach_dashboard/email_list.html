      --mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    body { font-family: var(--font); background: var(--bg); color: var(--text1); min-height: 100vh; }

    /* Header */
    .header {
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .header-title { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

    /* Controls */
    .controls {
      padding: 20px 32px;
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .search-box {
      padding: 10px 16px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text1); font-family: var(--font); font-size: 13px; outline: none;
      width: 280px;
    }
    .search-box:focus { border-color: var(--blue); }
    .filter-select {
      padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text1); font-family: var(--font); font-size: 13px; outline: none; cursor: pointer;
    }
    .count-badge {
      padding: 6px 12px; background: var(--blue); border-radius: 99px;
      font-size: 12px; font-weight: 700; color: #fff;
    }

    /* Stats row */
    .stats-bar {
      display: flex; gap: 16px; padding: 12px 32px;
      background: var(--bg); border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat-item { font-size: 12px; color: var(--text2); }
    .stat-item strong { font-size: 16px; font-weight: 800; margin-right: 4px; }

    /* Table */
    .table-wrap { padding: 0 32px 40px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    thead th {
      text-align: left; padding: 12px 14px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3);
      background: var(--bg1); border-bottom: 1px solid var(--border);
      position: sticky; top: 72px; cursor: pointer; user-select: none;
      white-space: nowrap;

    thead th:hover { color: var(--text2); }
    tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tr:hover td { background: var(--bg3); }
    td {

    }

    .tag-tech { background: rgba(16,185,129,0.15); color: #6ee7b7; }
    .tag-boutique { background: rgba(239,68,68,0.15); color: #fca5a5; }

    .flag { font-size: 16px; margin-right: 4px; }

    .email-cell {
      font-family: var(--mono); font-size: 11px; color: var(--cyan);
      cursor: pointer; transition: color 0.15s;
    }
    .email-cell:hover { color: #fff; }
    .email-cell.portal { color: var(--text3); font-style: italic; font-family: var(--font); font-size: 11px; }

    .prog-yes { color: var(--green); font-weight: 600; }
    .prog-no { color: var(--text3); }
    .prog-unknown { color: var(--yellow); }

</head>

const SECTOR_TAG = {
  Finance: "tag-finance", FinTech: "tag-fintech", Consulting: "tag-consulting",
  Data: "tag-data", Tech: "tag-tech", Boutique: "tag-boutique"
};

const COUNTRY_FLAG = {
  NL:"🇳🇱", DE:"🇩🇪", BE:"🇧🇪", FR:"🇫🇷", CH:"🇨🇭", UK:"🇬🇧",
  LU:"🇱🇺", SE:"🇸🇪", DK:"🇩🇰", IT:"🇮🇹", ES:"🇪🇸", AT:"🇦🇹"
};

let sortCol = -1;
let sortDir = 1;

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const sector = document.getElementById('filter-sector').value;
  const country = document.getElementById('filter-country').value;
  const fit = document.getElementById('filter-fit').value;
  const emailF = document.getElementById('filter-email').value;

  let filtered = COMPANIES.filter(c => {
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.city.toLowerCase().includes(q) || c.country.toLowerCase().includes(q) || c.note.toLowerCase().includes(q);
    const matchS = !sector || c.sector === sector;
    const matchC = !country || c.country === country;
    const matchFit = !fit || c.fit === fit;
    const matchEmail = !emailF || c.emailType === emailF;
    return matchQ && matchS && matchC && matchFit && matchEmail;
  });

  if (sortCol >= 0) {
    const keys = ['', 'name', 'country', 'city', 'sector', 'email', 'careers', '', 'program', 'fit'];
    const k = keys[sortCol];
    if (k) filtered.sort((a, b) => (a[k] > b[k] ? 1 : -1) * sortDir);
  }

  // Update count
  document.getElementById('count-badge').textContent = `${filtered.length} aziende`;

  // Update stats
  const statsEl = document.getElementById('stats-bar');
  const direct = filtered.filter(c => c.emailType === 'direct').length;
  const portal = filtered.filter(c => c.emailType === 'portal').length;
  const highFit = filtered.filter(c => c.fit === 'high').length;
  const progYes = filtered.filter(c => c.program === 'yes').length;
  statsEl.innerHTML = `
    <div class="stat-item"><strong style="color:var(--green)">${direct}</strong> Email Dirette</div>
    <div class="stat-item"><strong style="color:var(--blue)">${portal}</strong> Solo Portale</div>
    <div class="stat-item"><strong style="color:var(--green)">${highFit}</strong> Alto Fit</div>
    <div class="stat-item"><strong style="color:var(--yellow)">${progYes}</strong> Programma Stage</div>
    <div class="stat-item"><strong style="color:var(--text2)">${filtered.length}</strong> Totali Filtrate</div>
  `;

  // Render rows
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  filtered.forEach((c, i) => {
    const row = document.createElement('tr');
    const fitClass = {high:'fit-high', med:'fit-med', low:'fit-low'}[c.fit] || 'fit-low';
    const fitLabel = {high:'✅ Alto', med:'⚠️ Medio', low:'🔴 Basso'}[c.fit] || '';
    const progClass = {yes:'prog-yes', no:'prog-no', unknown:'prog-unknown'}[c.program];
    const progLabel = {yes:'✅ Sì', no:'❌ No', unknown:'❓ N/D'}[c.program];
    const flag = COUNTRY_FLAG[c.country] || '';
    const isEmailDirect = c.emailType === 'direct';

    row.innerHTML = `
      <td style="color:var(--text3);font-size:11px">${i + 1}</td>
      <td>${c.name}</td>
      <td><span class="flag">${flag}</span>${c.country}</td>
      <td>${c.city}</td>
      <td><span class="tag ${SECTOR_TAG[c.sector] || ''}">${c.sector}</span></td>
      <td>
        ${isEmailDirect
          ? `<span class="email-cell" title="Copia email" onclick="copyEmail('${c.email}')">📧 ${c.email}</span>`
          : `<span class="email-cell portal">🔗 Solo Portale</span>`}
      </td>
      <td><a href="${c.careers}" target="_blank" style="color:var(--blue);font-size:11px;text-decoration:none;">Vai al portale →</a></td>
      <td><span class="${progClass}">${progLabel}</span></td>
      <td><span class="fit-tag ${fitClass}">${fitLabel}</span></td>
      <td style="font-size:11px;color:var(--text3);max-width:260px;">${c.note}</td>
    `;
    tbody.appendChild(row);
  });
}

function sortTable(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  render();
}

function copyEmail(email) {
  navigator.clipboard.writeText(email).then(() => toast(`✅ Copiato: ${email}`));
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function exportCSV() {
  const q = document.getElementById('search').value.toLowerCase();
  const sector = document.getElementById('filter-sector').value;
  const country = document.getElementById('filter-country').value;
  const fit = document.getElementById('filter-fit').value;
  const emailF = document.getElementById('filter-email').value;

  let filtered = COMPANIES.filter(c => {
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.city.toLowerCase().includes(q);
    const matchS = !sector || c.sector === sector;
    const matchC = !country || c.country === country;
    const matchFit = !fit || c.fit === fit;
    const matchEmail = !emailF || c.emailType === emailF;
    return matchQ && matchS && matchC && matchFit && matchEmail;
  });

  const headers = ['Azienda','Paese','Città','Settore','Email/Contatto','Tipo Email','Portale Carriere','Programma Stage','Fit','Note'];
  const rows = filtered.map(c => [
    c.name, c.country, c.city, c.sector, c.email, c.emailType,
    c.careers, c.program, c.fit, `"${c.note.replace(/"/g,'""')}"`
  ].join(','));

  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'EU_Companies_Haroun_Jaafar.csv';
  a.click();
  toast('✅ CSV esportato!');
}

// Event listeners
['search','filter-sector','filter-country','filter-fit','filter-email'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});

render();
</script>
</body>
